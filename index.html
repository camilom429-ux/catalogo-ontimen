<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ON TIME - Catalogo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Inter',sans-serif; }
:root { --azul:#1d4ed8; --azul2:#1e40af; --bg:#f8fafc; --white:#fff; --border:#e2e8f0; }
body { background:var(--bg); min-height:100vh; }

.header {
  background:linear-gradient(135deg,#1d4ed8,#1e40af);
  color:white; padding:20px 20px 15px;
  position:sticky; top:0; z-index:100;
  box-shadow:0 4px 15px rgba(29,78,216,0.3);
}
.header-top { display:flex; justify-content:space-between; align-items:center; max-width:900px; margin:0 auto; }
.logo { font-size:1.5rem; font-weight:900; letter-spacing:-0.5px; }
.logo span { font-size:0.7rem; display:block; font-weight:400; opacity:0.8; margin-top:2px; }
.carrito-btn {
  background:rgba(255,255,255,0.2); border:none; color:white;
  padding:10px 16px; border-radius:12px; cursor:pointer;
  font-size:0.9rem; font-weight:700; display:flex; align-items:center; gap:8px;
}
.carrito-btn:hover { background:rgba(255,255,255,0.3); }
.carrito-count {
  background:white; color:var(--azul); width:22px; height:22px;
  border-radius:50%; font-size:0.75rem; font-weight:800;
  display:flex; align-items:center; justify-content:center;
}

.cats-wrap { background:white; border-bottom:1px solid var(--border); padding:12px 20px; overflow-x:auto; }
.cats-inner { display:flex; gap:8px; max-width:900px; margin:0 auto; }
.cat-btn {
  padding:6px 16px; border-radius:20px; border:1px solid var(--border);
  background:white; font-size:0.8rem; font-weight:600; color:#64748b;
  cursor:pointer; white-space:nowrap; transition:0.15s;
}
.cat-btn.active { background:var(--azul); border-color:var(--azul); color:white; }

.main { max-width:900px; margin:0 auto; padding:20px; }
.grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:14px; }

.prod-card {
  background:white; border-radius:16px; overflow:hidden;
  border:2px solid var(--border); cursor:pointer;
  transition:all 0.15s; position:relative;
}
.prod-card:hover { border-color:var(--azul); transform:translateY(-3px); box-shadow:0 8px 20px rgba(29,78,216,0.12); }
.prod-card.agotado { opacity:0.6; }

.prod-img {
  width:100%; height:140px;
  background:linear-gradient(135deg,#eff6ff,#dbeafe);
  display:flex; align-items:center; justify-content:center;
  font-size:2.5rem; overflow:hidden;
}
.prod-img img { width:100%; height:100%; object-fit:cover; }

.prod-info { padding:10px 12px 12px; }
.prod-nombre { font-weight:700; font-size:0.85rem; color:#1e293b; margin-bottom:3px; line-height:1.3; }
.prod-cat { font-size:0.72rem; color:#94a3b8; margin-bottom:8px; }
.prod-footer { display:flex; justify-content:space-between; align-items:center; }
.prod-precio { font-weight:800; font-size:0.9rem; color:var(--azul); }
.prod-stock-badge { font-size:0.65rem; padding:2px 7px; border-radius:8px; background:#d1fae5; color:#065f46; font-weight:600; }
.prod-stock-badge.sin { background:#fee2e2; color:#b91c1c; }

.cant-wrap { display:flex; align-items:center; gap:12px; margin-bottom:20px; }
.cant-btn { width:36px; height:36px; border-radius:10px; border:1px solid var(--border); background:#f8fafc; cursor:pointer; font-size:1.2rem; font-weight:700; color:var(--azul); }
.cant-val { font-size:1.3rem; font-weight:800; min-width:30px; text-align:center; }

.modal-overlay {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.5); z-index:1000;
  align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.open { display:flex; }
.modal {
  background:white; border-radius:20px; padding:25px;
  width:100%; max-width:400px; max-height:90vh; overflow-y:auto;
  animation:slideUp 0.25s ease;
}
@keyframes slideUp { from { transform:translateY(30px); opacity:0; } to { transform:translateY(0); opacity:1; } }
.modal-header { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
.modal-titulo { font-size:1.1rem; font-weight:800; color:#1e293b; }
.modal-precio { font-size:1.3rem; font-weight:900; color:var(--azul); }
.modal-close { background:none; border:none; font-size:1.4rem; cursor:pointer; color:#94a3b8; padding:0; }
.modal-label { font-size:0.75rem; font-weight:700; color:#64748b; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; display:block; }
.btn-agregar { width:100%; padding:14px; background:var(--azul); color:white; border:none; border-radius:12px; font-size:1rem; font-weight:800; cursor:pointer; }
.btn-agregar:hover { background:var(--azul2); }

.carrito-panel { display:none; position:fixed; inset:0; z-index:2000; }
.carrito-panel.open { display:flex; }
.carrito-overlay { flex:1; background:rgba(0,0,0,0.4); }
.carrito-drawer { width:100%; max-width:420px; background:white; display:flex; flex-direction:column; animation:slideRight 0.25s ease; }
@keyframes slideRight { from { transform:translateX(100%); } to { transform:translateX(0); } }
.carrito-drawer-header { padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.carrito-drawer-header h3 { font-size:1.1rem; font-weight:800; }
.carrito-items { flex:1; overflow-y:auto; padding:15px; }
.carrito-item { display:flex; justify-content:space-between; align-items:flex-start; padding:12px 0; border-bottom:1px solid #f8fafc; gap:10px; }
.carrito-item-info { flex:1; }
.carrito-item-nombre { font-weight:700; font-size:0.9rem; }
.carrito-item-detalle { font-size:0.78rem; color:#64748b; margin-top:2px; }
.carrito-item-precio { font-weight:800; color:var(--azul); font-size:0.9rem; }
.carrito-item-quitar { background:none; border:none; color:#ef4444; cursor:pointer; font-size:0.8rem; margin-top:4px; }
.carrito-footer { padding:20px; border-top:2px solid var(--border); background:#fafafe; }
.carrito-total { display:flex; justify-content:space-between; font-size:1.1rem; font-weight:900; color:var(--azul); margin-bottom:15px; }
.btn-pedido { width:100%; padding:15px; background:linear-gradient(135deg,var(--azul),var(--azul2)); color:white; border:none; border-radius:12px; font-size:1rem; font-weight:800; cursor:pointer; box-shadow:0 4px 12px rgba(29,78,216,0.3); }
.btn-pedido:hover { transform:translateY(-1px); }

.checkout-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:3000; align-items:center; justify-content:center; padding:20px; }
.checkout-modal.open { display:flex; }
.checkout-box { background:white; border-radius:20px; padding:25px; width:100%; max-width:400px; animation:slideUp 0.25s ease; }
.checkout-box h3 { font-size:1.1rem; font-weight:800; margin-bottom:20px; }
.checkout-input { width:100%; padding:12px; border:1px solid var(--border); border-radius:10px; margin-bottom:12px; font-size:0.9rem; outline:none; }
.checkout-input:focus { border-color:var(--azul); }
.entrega-btns { display:flex; gap:10px; margin-bottom:18px; }
.entrega-btn { flex:1; padding:12px; border-radius:12px; border:2px solid var(--border); background:white; cursor:pointer; font-size:0.85rem; font-weight:600; color:#64748b; text-align:center; }
.entrega-btn.active { border-color:var(--azul); background:#eff6ff; color:var(--azul); }
.btn-enviar-wa { width:100%; padding:14px; background:linear-gradient(135deg,#25d366,#128c7e); color:white; border:none; border-radius:12px; font-size:1rem; font-weight:800; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; }
.btn-enviar-wa:hover { transform:translateY(-1px); box-shadow:0 4px 15px rgba(37,211,102,0.4); }
.btn-cancelar-checkout { width:100%; padding:12px; background:none; border:1px solid var(--border); border-radius:12px; color:#64748b; font-size:0.9rem; font-weight:600; cursor:pointer; margin-top:8px; }

.toast { position:fixed; bottom:80px; left:50%; transform:translateX(-50%); background:#1e293b; color:white; padding:10px 20px; border-radius:20px; font-size:0.85rem; font-weight:600; z-index:9999; opacity:0; transition:opacity 0.3s; pointer-events:none; }
.toast.show { opacity:1; }
.empty { text-align:center; padding:60px 20px; color:#94a3b8; }
.empty-icon { font-size:3rem; margin-bottom:15px; }
.page-loader { position:fixed; inset:0; background:white; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; }
.spinner { width:40px; height:40px; border:4px solid #e2e8f0; border-top-color:var(--azul); border-radius:50%; animation:spin 0.8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }

@media (max-width:480px) {
  .grid { grid-template-columns:repeat(2,1fr); gap:10px; }
  .carrito-drawer { max-width:100%; }
  .modal { padding:20px; }
}
</style>
</head>
<body>

<div class="page-loader" id="page-loader">
  <div class="spinner"></div>
  <p style="margin-top:15px; color:#64748b; font-weight:600">Cargando catalogo...</p>
</div>

<div class="header">
  <div class="header-top">
    <div class="logo">ON TIME <span>Catalogo Virtual</span></div>
    <button class="carrito-btn" onclick="abrirCarrito()">
      &#128722; Carrito
      <div class="carrito-count" id="carrito-count">0</div>
    </button>
  </div>
</div>

<div class="cats-wrap">
  <div class="cats-inner" id="cats-container"></div>
</div>

<div class="main">
  <div class="grid" id="productos-grid"></div>
</div>

<!-- MODAL DETALLE PRODUCTO -->
<div class="modal-overlay" id="modal-variante">
  <div class="modal">
    <div class="modal-header">
      <div>
        <div class="modal-titulo" id="mv-nombre"></div>
        <div class="modal-precio" id="mv-precio"></div>
      </div>
      <button class="modal-close" onclick="cerrarModal()">&#10005;</button>
    </div>
    <div id="mv-foto"></div>
    <div id="mv-stock-info" style="font-size:0.85rem; color:#64748b; margin-bottom:15px;"></div>
    <label class="modal-label">Cantidad</label>
    <div class="cant-wrap">
      <button class="cant-btn" onclick="cambiarCant(-1)">-</button>
      <span class="cant-val" id="mv-cant">1</span>
      <button class="cant-btn" onclick="cambiarCant(1)">+</button>
    </div>
    <button class="btn-agregar" onclick="agregarAlCarrito()">Agregar al carrito</button>
  </div>
</div>

<!-- PANEL CARRITO -->
<div class="carrito-panel" id="carrito-panel">
  <div class="carrito-overlay" onclick="cerrarCarrito()"></div>
  <div class="carrito-drawer">
    <div class="carrito-drawer-header">
      <h3>&#128722; Tu carrito</h3>
      <button onclick="cerrarCarrito()" style="background:none; border:none; font-size:1.4rem; cursor:pointer; color:#94a3b8">&#10005;</button>
    </div>
    <div class="carrito-items" id="carrito-items">
      <div class="empty"><div class="empty-icon">&#128722;</div><p>Tu carrito esta vacio</p></div>
    </div>
    <div class="carrito-footer">
      <div class="carrito-total"><span>Total</span><span id="carrito-total-val">$0</span></div>
      <button class="btn-pedido" onclick="abrirCheckout()">Finalizar pedido &#10132;</button>
    </div>
  </div>
</div>

<!-- MODAL CHECKOUT -->
<div class="checkout-modal" id="checkout-modal">
  <div class="checkout-box">
    <h3>&#128222; Tus datos para el pedido</h3>
    <input class="checkout-input" id="co-nombre" placeholder="Tu nombre completo *">
    <input class="checkout-input" id="co-telefono" placeholder="Tu numero de telefono *" type="tel">
    <label class="modal-label" style="margin-bottom:8px">Metodo de entrega</label>
    <div class="entrega-btns">
      <button class="entrega-btn active" id="btn-domicilio" onclick="selEntrega('domicilio')">&#128663; Domicilio</button>
      <button class="entrega-btn" id="btn-recoger" onclick="selEntrega('recoger')">&#128203; Recoger en tienda</button>
    </div>
    <div id="campo-direccion">
      <input class="checkout-input" id="co-direccion" placeholder="Direccion de entrega">
    </div>
    <button class="btn-enviar-wa" onclick="enviarPorWhatsapp()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Enviar pedido por WhatsApp
    </button>
    <button class="btn-cancelar-checkout" onclick="cerrarCheckout()">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var catalogoData = { productos: [], categorias: [], config: {}, whatsapp: '573216951468' };
var carrito = [];
var catActiva = 'Todas';
var modalProd = null;
var modalCant = 1;
var varianteSeleccionada = null;
var metodoEntrega = 'domicilio';

window.onload = function() {
  google.script.run
    .withFailureHandler(function() {
      document.getElementById('page-loader').style.display = 'none';
      document.getElementById('productos-grid').innerHTML =
        '<div class="empty"><div class="empty-icon">&#9888;</div><p>Error cargando el catálogo.</p></div>';
    })
    .withSuccessHandler(function(data) {
      document.getElementById('page-loader').style.display = 'none';
      if (data.error) { alert('Error: ' + data.error); return; }
      catalogoData = data;
      renderCats();
      renderProductos();
    }).getCatalogoData();
};

function renderCats() {
  var cats = ['Todas'].concat(catalogoData.categorias);
  var html = '';
  for (var i = 0; i < cats.length; i++) {
    html += '<button class="cat-btn ' + (cats[i]==='Todas'?'active':'') + '" '
          + 'onclick="filtrarCat(\'' + cats[i] + '\', this)">' + cats[i] + '</button>';
  }
  document.getElementById('cats-container').innerHTML = html;
}

function filtrarCat(cat, btn) {
  catActiva = cat;
  document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  renderProductos();
}

function getProdsFiltrados() {
  return catalogoData.productos.filter(function(p) {
    return catActiva === 'Todas' || p.cat === catActiva;
  });
}

function renderProductos() {
  var prods = getProdsFiltrados();
  if (prods.length === 0) {
    document.getElementById('productos-grid').innerHTML =
      '<div class="empty" style="grid-column:1/-1">'
      + '<div class="empty-icon">&#128248;</div>'
      + '<p>No hay productos en esta categoría</p></div>';
    return;
  }
  var html = '';
  for (var i = 0; i < prods.length; i++) {
    var p = prods[i];
    var sinStock = p.stock <= 0;
    var imgHtml = (p.foto && p.foto !== '')
      ? '<img src="' + p.foto + '" style="width:100%;height:100%;object-fit:cover" '
        + 'onerror="this.parentElement.innerHTML=\'&#128248;\'">'
      : '&#128248;';

    var precioLabel = p.esGrupo
      ? 'Desde $' + p.venta.toLocaleString('es-CL')
      : '$'       + p.venta.toLocaleString('es-CL');

    var varBadge = p.esGrupo
      ? '<span style="font-size:0.62rem;background:#e0e7ff;color:#4338ca;'
        + 'padding:2px 7px;border-radius:8px;font-weight:700;">'
        + p.variantes.filter(function(v){ return v.stock > 0; }).length
        + ' tamaños</span>'
      : '<span class="prod-stock-badge' + (sinStock ? ' sin' : '') + '">'
        + (sinStock ? 'Agotado' : p.stock + ' disp.') + '</span>';

    html += '<div class="prod-card' + (sinStock ? ' agotado' : '') + '" onclick="abrirModal(' + i + ')">'
      + '<div class="prod-img">' + imgHtml + '</div>'
      + '<div class="prod-info">'
      + '<div class="prod-nombre">' + p.nombre + '</div>'
      + '<div class="prod-cat">'   + p.cat    + '</div>'
      + '<div class="prod-footer">'
      + '<span class="prod-precio">' + precioLabel + '</span>'
      + varBadge
      + '</div></div></div>';
  }
  document.getElementById('productos-grid').innerHTML = html;
}

// ── MODAL ────────────────────────────────────────────────────
function abrirModal(idx) {
  var prods = getProdsFiltrados();
  var prod  = prods[idx];
  if (!prod) return;
  window._prodModal    = prod;
  varianteSeleccionada = null;
  modalCant            = 1;
  document.getElementById('mv-cant').innerText = 1;

  if (prod.esGrupo && prod.variantes && prod.variantes.length > 0) {
    // ── Modal con selector de variantes ──────────────────────
    document.getElementById('mv-nombre').innerText     = prod.nombre;
    document.getElementById('mv-precio').innerText     = 'Elige un tamaño';
    document.getElementById('mv-stock-info').innerText = '';

    var fotoSrc = prod.foto || (prod.variantes[0] ? prod.variantes[0].foto : '');
    var fotoHtml = fotoSrc
      ? '<img id="mv-foto-img" src="' + fotoSrc + '" '
        + 'style="width:100%;height:185px;object-fit:cover;border-radius:12px;margin-bottom:14px;" '
        + 'onerror="this.style.display=\'none\'">'
      : '<div id="mv-foto-img"></div>';

    var botonesHtml = '';
    for (var vi = 0; vi < prod.variantes.length; vi++) {
      var v        = prod.variantes[vi];
      var sinStockV = v.stock <= 0;
      var etiqueta  = extraerEtiqueta(v.label, prod.nombre);
      botonesHtml +=
        '<button id="btn-var-' + vi + '" '
        + (sinStockV ? 'disabled ' : '')
        + 'onclick="seleccionarVariante(' + vi + ')" '
        + 'style="position:relative;padding:10px 18px;border-radius:12px;'
        + 'border:2px solid #e2e8f0;'
        + 'background:' + (sinStockV ? '#f8fafc' : 'white') + ';'
        + 'color:'      + (sinStockV ? '#94a3b8' : '#1e293b') + ';'
        + 'font-weight:700;font-size:0.85rem;'
        + 'cursor:'   + (sinStockV ? 'not-allowed' : 'pointer') + ';'
        + 'opacity:'  + (sinStockV ? '0.55' : '1') + ';'
        + 'transition:all 0.15s;">'
        + etiqueta
        + (sinStockV
          ? '<span style="position:absolute;top:-7px;right:-7px;background:#ef4444;'
            + 'color:white;border-radius:20px;font-size:0.55rem;padding:2px 5px;font-weight:800;">Agotado</span>'
          : '')
        + '</button>';
    }

    document.getElementById('mv-foto').innerHTML =
        fotoHtml
      + '<div style="font-size:0.7rem;font-weight:700;color:#64748b;'
      + 'text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;">'
      + 'Selecciona tamaño / presentación</div>'
      + '<div id="variantes-btns" '
      + 'style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;">'
      + botonesHtml + '</div>'
      + '<div id="variante-info" '
      + 'style="display:none;background:#eff6ff;border-radius:12px;'
      + 'padding:12px 14px;margin-bottom:14px;'
      + 'justify-content:space-between;align-items:center;">'
      + '<div>'
      + '<div style="font-size:0.7rem;color:#64748b;font-weight:600;" id="vi-label"></div>'
      + '<div style="font-size:1.1rem;font-weight:900;color:#1d4ed8;" id="vi-precio"></div>'
      + '</div>'
      + '<div style="font-size:0.78rem;color:#64748b;font-weight:600;" id="vi-stock"></div>'
      + '</div>';

  } else {
    // ── Modal producto simple ─────────────────────────────────
    modalProd = prod;
    document.getElementById('mv-nombre').innerText     = prod.nombre;
    document.getElementById('mv-precio').innerText     = '$' + prod.venta.toLocaleString('es-CL');
    document.getElementById('mv-stock-info').innerText = prod.stock > 0
      ? 'Disponibles: ' + prod.stock + ' unidades' : 'Agotado';

    var fotoDiv = document.getElementById('mv-foto');
    if (prod.foto && prod.foto !== '') {
      fotoDiv.innerHTML =
        '<div style="position:relative;margin-bottom:15px;cursor:zoom-in;" '
        + 'onclick="abrirVisorFoto(\'' + prod.foto + '\',\''
        + prod.nombre.replace(/'/g,'') + '\')">'
        + '<img src="' + prod.foto + '" '
        + 'style="width:100%;height:200px;object-fit:cover;border-radius:12px;display:block;" '
        + 'onerror="this.parentElement.style.display=\'none\'">'
        + '<div style="position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.55);'
        + 'color:white;border-radius:8px;padding:5px 10px;font-size:0.72rem;font-weight:700;">'
        + '&#128269; Ver foto completa</div>'
        + '</div>';
    } else {
      fotoDiv.innerHTML = '';
    }
  }

  document.getElementById('modal-variante').classList.add('open');
}

function extraerEtiqueta(labelCompleto, nombreBase) {
  var limpio = labelCompleto
    .replace(new RegExp('^' + nombreBase.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')
      + '\\s*[-|/]?\\s*', 'i'), '')
    .trim();
  return limpio || labelCompleto;
}

function seleccionarVariante(idx) {
  var prod = window._prodModal;
  if (!prod || !prod.variantes) return;
  var v = prod.variantes[idx];
  if (!v || v.stock <= 0) return;

  varianteSeleccionada = v;

  // Resaltar botón activo
  for (var i = 0; i < prod.variantes.length; i++) {
    var btn = document.getElementById('btn-var-' + i);
    if (!btn) continue;
    var activo = (i === idx);
    btn.style.borderColor = activo ? '#1d4ed8' : '#e2e8f0';
    btn.style.background  = activo ? '#eff6ff' : 'white';
    btn.style.color       = activo ? '#1d4ed8' : '#1e293b';
    btn.style.transform   = activo ? 'scale(1.05)' : 'scale(1)';
    btn.style.boxShadow   = activo ? '0 0 0 3px rgba(29,78,216,0.15)' : 'none';
  }

  // Mostrar info del tamaño elegido
  var infoEl = document.getElementById('variante-info');
  if (infoEl) {
    infoEl.style.display = 'flex';
    document.getElementById('vi-label').innerText  = extraerEtiqueta(v.label, prod.nombre);
    document.getElementById('vi-precio').innerText = '$' + v.venta.toLocaleString('es-CL');
    document.getElementById('vi-stock').innerText  = v.stock + ' disp.';
  }
  document.getElementById('mv-precio').innerText = '$' + v.venta.toLocaleString('es-CL');

  // Cambiar foto si la variante tiene la suya
  var fotoImg = document.getElementById('mv-foto-img');
  if (fotoImg && v.foto && v.foto !== '') fotoImg.src = v.foto;
}

function cerrarModal() {
  document.getElementById('modal-variante').classList.remove('open');
  varianteSeleccionada = null;
  window._prodModal    = null;
  modalProd            = null;
}

function cambiarCant(delta) {
  modalCant = Math.max(1, modalCant + delta);
  document.getElementById('mv-cant').innerText = modalCant;
}

// ── AGREGAR AL CARRITO ───────────────────────────────────────
function agregarAlCarrito() {
  var prod = window._prodModal;

  if (prod && prod.esGrupo) {
    if (!varianteSeleccionada) {
      mostrarToast('👆 Primero selecciona un tamaño');
      // Pulsar botones para guiar
      var btns = document.querySelectorAll('[id^="btn-var-"]');
      btns.forEach(function(b) {
        b.style.transform = 'scale(1.08)';
        setTimeout(function() { b.style.transform = 'scale(1)'; }, 200);
      });
      return;
    }
    var etiqueta = extraerEtiqueta(varianteSeleccionada.label, prod.nombre);
    var ckey     = 'var-' + varianteSeleccionada.id;
    var existe   = null;
    for (var i = 0; i < carrito.length; i++) {
      if (carrito[i].key === ckey) { existe = carrito[i]; break; }
    }
    if (existe) { existe.cant += modalCant; }
    else {
      carrito.push({
        key:    ckey,
        id:     varianteSeleccionada.id,
        nombre: prod.nombre + ' · ' + etiqueta,
        precio: varianteSeleccionada.venta,
        cant:   modalCant
      });
    }
    actualizarContadorCarrito();
    mostrarToast('✓ ' + prod.nombre + ' ' + etiqueta + ' agregado');
    cerrarModal();
    return;
  }

  // Producto simple
  if (!modalProd) return;
  if (modalProd.stock <= 0) { mostrarToast('Producto agotado'); return; }
  var ckey2  = 'prod-' + modalProd.id;
  var existe2 = null;
  for (var i = 0; i < carrito.length; i++) {
    if (carrito[i].key === ckey2) { existe2 = carrito[i]; break; }
  }
  if (existe2) { existe2.cant += modalCant; }
  else {
    carrito.push({
      key:    ckey2,
      id:     modalProd.id,
      nombre: modalProd.nombre,
      precio: modalProd.venta,
      cant:   modalCant
    });
  }
  actualizarContadorCarrito();
  mostrarToast('✓ ' + modalProd.nombre + ' agregado');
  cerrarModal();
}

// ── CARRITO ──────────────────────────────────────────────────
function actualizarContadorCarrito() {
  var total = 0;
  for (var i = 0; i < carrito.length; i++) { total += carrito[i].cant; }
  document.getElementById('carrito-count').innerText = total;
}

function abrirCarrito()  { renderCarrito(); document.getElementById('carrito-panel').classList.add('open'); }
function cerrarCarrito() { document.getElementById('carrito-panel').classList.remove('open'); }

function renderCarrito() {
  var cont = document.getElementById('carrito-items');
  if (carrito.length === 0) {
    cont.innerHTML = '<div class="empty"><div class="empty-icon">&#128722;</div>'
      + '<p>Tu carrito está vacío</p></div>';
    document.getElementById('carrito-total-val').innerText = '$0';
    return;
  }
  var total = 0, html = '';
  for (var i = 0; i < carrito.length; i++) {
    var item     = carrito[i];
    var subtotal = item.cant * item.precio;
    total       += subtotal;
    html +=
      '<div class="carrito-item">'
      + '<div class="carrito-item-info">'
      + '<div class="carrito-item-nombre">'  + item.nombre + '</div>'
      + '<div class="carrito-item-detalle">x' + item.cant
      + ' · $' + item.precio.toLocaleString('es-CL') + ' c/u</div>'
      + '<button class="carrito-item-quitar" onclick="quitarItem(' + i + ')">'
      + '&#10005; Quitar</button>'
      + '</div>'
      + '<div class="carrito-item-precio">$' + subtotal.toLocaleString('es-CL') + '</div>'
      + '</div>';
  }
  cont.innerHTML = html;
  document.getElementById('carrito-total-val').innerText = '$' + total.toLocaleString('es-CL');
}

function quitarItem(idx) { carrito.splice(idx, 1); actualizarContadorCarrito(); renderCarrito(); }

// ── CHECKOUT ─────────────────────────────────────────────────
function abrirCheckout() {
  if (carrito.length === 0) { mostrarToast('Tu carrito está vacío'); return; }
  cerrarCarrito();
  document.getElementById('checkout-modal').classList.add('open');
}
function cerrarCheckout() { document.getElementById('checkout-modal').classList.remove('open'); }

function selEntrega(tipo) {
  metodoEntrega = tipo;
  document.getElementById('btn-domicilio').classList.toggle('active', tipo === 'domicilio');
  document.getElementById('btn-recoger').classList.toggle('active',   tipo === 'recoger');
  document.getElementById('campo-direccion').style.display = tipo === 'domicilio' ? 'block' : 'none';
}

function enviarPorWhatsapp() {
  var nombre    = document.getElementById('co-nombre').value.trim();
  var telefono  = document.getElementById('co-telefono').value.trim();
  var direccion = document.getElementById('co-direccion').value.trim();
  if (!nombre)   { mostrarToast('Ingresa tu nombre');    return; }
  if (!telefono) { mostrarToast('Ingresa tu teléfono');  return; }
  if (metodoEntrega === 'domicilio' && !direccion) {
    mostrarToast('Ingresa tu dirección'); return;
  }
  var total  = 0;
  var lineas = ['*NUEVO PEDIDO - ON TIME*', ''];
  lineas.push('*Datos del cliente:*');
  lineas.push('Nombre: '   + nombre);
  lineas.push('Teléfono: ' + telefono);
  lineas.push('Entrega: '  + (metodoEntrega === 'domicilio'
    ? 'Domicilio → ' + direccion : 'Recoger en tienda'));
  lineas.push('');
  lineas.push('*Productos:*');
  for (var i = 0; i < carrito.length; i++) {
    var item = carrito[i];
    var sub  = item.cant * item.precio;
    total   += sub;
    lineas.push('• ' + item.nombre + '  x' + item.cant
      + '  =  $' + sub.toLocaleString('es-CL'));
  }
  lineas.push('');
  lineas.push('*TOTAL: $' + total.toLocaleString('es-CL') + '*');
  var whatsapp = catalogoData.whatsapp || '573216951468';
  window.open('https://wa.me/' + whatsapp
    + '?text=' + encodeURIComponent(lineas.join('\n')), '_blank');
  cerrarCheckout();
  carrito = [];
  actualizarContadorCarrito();
  mostrarToast('¡Pedido enviado correctamente!');
}

// ── UTILIDADES ───────────────────────────────────────────────
function mostrarToast(msg) {
  var t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2500);
}

function abrirVisorFoto(url, nombre) {
  var visor = document.createElement('div');
  visor.id  = 'visor-foto-overlay';
  visor.style.cssText =
    'position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:9999;'
    + 'display:flex;flex-direction:column;align-items:center;justify-content:center;'
    + 'animation:fadeInVisor 0.2s ease;';
  visor.innerHTML =
    '<div style="position:absolute;top:0;left:0;right:0;padding:16px 20px;'
    + 'display:flex;justify-content:space-between;align-items:center;'
    + 'background:linear-gradient(to bottom,rgba(0,0,0,0.7),transparent);z-index:2;">'
    + '<span style="color:white;font-size:0.9rem;font-weight:700;max-width:80%;'
    + 'overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + nombre + '</span>'
    + '<button onclick="cerrarVisorFoto()" style="background:rgba(255,255,255,0.15);'
    + 'border:none;color:white;width:36px;height:36px;border-radius:50%;cursor:pointer;'
    + 'font-size:1.2rem;display:flex;align-items:center;justify-content:center;">&#10005;</button>'
    + '</div>'
    + '<div id="visor-img-wrap" style="width:100%;height:100%;display:flex;'
    + 'align-items:center;justify-content:center;overflow:hidden;touch-action:none;">'
    + '<img id="visor-img-principal" src="' + url + '" '
    + 'style="max-width:100%;max-height:90vh;object-fit:contain;border-radius:4px;'
    + 'transition:transform 0.2s ease;user-select:none;" draggable="false">'
    + '</div>'
    + '<div style="position:absolute;bottom:20px;left:0;right:0;text-align:center;">'
    + '<span style="color:rgba(255,255,255,0.5);font-size:0.72rem;">Pellizca para hacer zoom</span>'
    + '</div>';
  document.body.appendChild(visor);
  document.body.style.overflow = 'hidden';
  visor.addEventListener('click', function(e) {
    if (e.target === visor || e.target.id === 'visor-img-wrap') cerrarVisorFoto();
  });
  var img = document.getElementById('visor-img-principal');
  var escala = 1, escalaInicio = 1, distInicio = 0;
  var posX = 0, posY = 0, posXInicio = 0, posYInicio = 0;
  var arrastrando = false, tocando = false;
  function distancia(t1, t2) {
    var dx = t1.clientX-t2.clientX, dy = t1.clientY-t2.clientY;
    return Math.sqrt(dx*dx+dy*dy);
  }
  img.addEventListener('touchstart', function(e) {
    if (e.touches.length===2) {
      tocando=true; distInicio=distancia(e.touches[0],e.touches[1]); escalaInicio=escala;
    } else if (e.touches.length===1 && escala>1) {
      arrastrando=true; posXInicio=e.touches[0].clientX-posX; posYInicio=e.touches[0].clientY-posY;
    }
  },{passive:true});
  img.addEventListener('touchmove', function(e) {
    if (e.touches.length===2 && tocando) {
      e.preventDefault();
      escala = Math.min(4,Math.max(1,escalaInicio*(distancia(e.touches[0],e.touches[1])/distInicio)));
      img.style.transform='scale('+escala+') translate('+posX/escala+'px,'+posY/escala+'px)';
    } else if (e.touches.length===1 && arrastrando && escala>1) {
      e.preventDefault();
      posX=e.touches[0].clientX-posXInicio; posY=e.touches[0].clientY-posYInicio;
      img.style.transform='scale('+escala+') translate('+posX/escala+'px,'+posY/escala+'px)';
    }
  },{passive:false});
  img.addEventListener('touchend', function() {
    tocando=false; arrastrando=false;
    if (escala<=1){escala=1;posX=0;posY=0;img.style.transform='scale(1)';}
  });
  var ultimoTap=0;
  img.addEventListener('touchend', function() {
    var ahora=Date.now();
    if (ahora-ultimoTap<300){escala=escala>1?1:2.5;if(escala===1){posX=0;posY=0;}img.style.transform='scale('+escala+')';}
    ultimoTap=ahora;
  });
  if (!document.getElementById('style-visor')) {
    var s=document.createElement('style');
    s.id='style-visor';
    s.innerHTML='@keyframes fadeInVisor{from{opacity:0}to{opacity:1}}';
    document.head.appendChild(s);
  }
}

function cerrarVisorFoto() {
  var v = document.getElementById('visor-foto-overlay');
  if (v) {
    v.style.opacity='0'; v.style.transition='opacity 0.18s';
    setTimeout(function(){if(v.parentNode)v.parentNode.removeChild(v);},180);
  }
  document.body.style.overflow='';
}
</script>
